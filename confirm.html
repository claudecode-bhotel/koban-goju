<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約完了 | b hotel 高万五柔</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f9f6f0; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 48px 40px; max-width: 560px; width: 100%; text-align: center; }
    .icon { width: 72px; height: 72px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 36px; }
    h1 { font-size: 26px; font-weight: 700; color: #2e7d32; margin-bottom: 12px; }
    .subtitle { font-size: 16px; color: #666; margin-bottom: 32px; line-height: 1.6; }
    .booking-details { background: #f5f5f5; border-radius: 8px; padding: 24px; text-align: left; margin-bottom: 32px; }
    .booking-details h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e8e8e8; font-size: 15px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #666; }
    .detail-value { font-weight: 600; color: #333; }
    .loading { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 20px 0; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e8e8e8; border-top-color: #2e7d32; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: #fff3e0; border: 1px solid #ffcc80; border-radius: 8px; padding: 20px; margin-bottom: 24px; font-size: 14px; color: #e65100; line-height: 1.6; }
    .btn { display: inline-block; padding: 14px 32px; border-radius: 8px; font-size: 15px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #333; }
    .email-note { margin-top: 24px; font-size: 13px; color: #999; line-height: 1.6; }
    #loading-view { display: block; } #success-view { display: none; } #error-view { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading-view">
      <div class="loading">
        <div class="spinner"></div>
        <p>予約を確認しています...</p>
      </div>
    </div>
    <div id="success-view">
      <div class="icon">&#10003;</div>
      <h1>予約が確定しました</h1>
      <p class="subtitle">ご予約ありがとうございます。<br>確認メールをお送りしましたのでご確認ください。</p>
      <div class="booking-details">
        <h2>ご予約内容</h2>
        <div class="detail-row"><span class="detail-label">予約番号</span><span class="detail-value" id="detail-booking-id">-</span></div>
        <div class="detail-row"><span class="detail-label">日付</span><span class="detail-value" id="detail-date">-</span></div>
        <div class="detail-row"><span class="detail-label">お名前</span><span class="detail-value" id="detail-name">-</span></div>
        <div class="detail-row"><span class="detail-label">人数</span><span class="detail-value" id="detail-guests">-</span></div>
        <div class="detail-row"><span class="detail-label">合計金額</span><span class="detail-value" id="detail-amount">-</span></div>
        <div class="detail-row"><span class="detail-label">ステータス</span><span class="detail-value" id="detail-status">-</span></div>
      </div>
      <a href="https://claudecode-bhotel.github.io/koban-goju/booking.html" class="btn btn-primary">トップページに戻る</a>
      <p class="email-note">ご不明な点は info@bhoteljp.com までお問い合わせください。</p>
    </div>
    <div id="error-view">
      <div class="icon" style="background:#fff3e0;font-size:32px;">!</div>
      <h1 style="color:#e65100;">確認できませんでした</h1>
      <div class="error-box" id="error-message"></div>
      <a href="https://claudecode-bhotel.github.io/koban-goju/booking.html" class="btn btn-primary">予約ページに戻る</a>
    </div>
  </div>
  <!-- api.js と同じ通信方式を使用 (text/plain で CORS preflight 回避) -->
  <script src="js/api.js"></script>
  <script>
    function show(id){['loading-view','success-view','error-view'].forEach(function(v){document.getElementById(v).style.display=(v===id)?'block':'none';});}
    function fmtDate(s){if(!s)return '-';try{var d=new Date(s+'T00:00:00+09:00');return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 ['+'日月火水木金土'[d.getDay()]+']';}catch(e){return s;}}
    function fmtAmt(n){return(n||n===0)?'¥'+Number(n).toLocaleString():'-';}
    function fmtSt(s){return s==='confirmed'?'確定':s==='tentative'?'仮予約':s||'-';}
    (function(){
      var sid=new URLSearchParams(location.search).get('session_id');
      if(!sid){show('error-view');document.getElementById('error-message').textContent='セッションIDが見つかりません。';return;}
      show('loading-view');
      apiPost('confirmBooking', { session_id: sid })
      .then(function(d){
        if(d.error){show('error-view');document.getElementById('error-message').textContent='エラー: '+d.error;return;}
        document.getElementById('detail-booking-id').textContent=d.booking_id||'-';
        document.getElementById('detail-date').textContent=fmtDate(d.date);
        document.getElementById('detail-name').textContent=d.name||'-';
        document.getElementById('detail-guests').textContent='大人'+(d.adults||0)+'名'+(d.children>0?'・子ども'+d.children+'名':'');
        document.getElementById('detail-amount').textContent=fmtAmt(d.totalAmount);
        document.getElementById('detail-status').textContent=fmtSt(d.status);
        show('success-view');
      })
      .catch(function(e){show('error-view');document.getElementById('error-message').textContent='通信エラー: '+e.message;});
    })();
  </script>
</body>
</html>
